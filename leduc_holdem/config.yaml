api:
  endpoint: "https://aoai-army.openai.azure.us/"
  key_env_var: AZURE_OPENAI_API_KEY   # Read key from environment only
  deployment: "gpt-5.1"
  api_version: "2024-10-21"
  max_retries: 5
  retry_delay: 10                      # seconds between retries on 429

game:
  hands_per_tournament: 5
  starting_chips: 50
  ante: 1
  preflop_raise_size: 2
  preflop_raise_cap: 2
  postflop_raise_size: 4
  postflop_raise_cap: 2

training:
  personalities:
    - analytical
    - conservative
    - aggressive
    - reckless
  num_tournaments: 100
  first_pass_tournaments: 20          # Used for initial smoke test
  train_split: 0.75
  n_workers: 4                       # One per personality
  random_seed_base: 42               # seed = base + tournament_index

observation:
  vector_length: 22
  slots_per_hand: 4
  hands_per_tournament: 5
  pad_value: -1.0
  flat_length: 440                   # 20 slots x 22 features

paths:
  instructions_dir: instructions/
  data_dir: data/observations/
  model_dir: data/models/
  tournament_dir: data/tournament/
  lda_model_filename: best_lda_model.pkl

lda:
  kfold_splits: 5
